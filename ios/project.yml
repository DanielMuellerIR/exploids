name: Exploids

# Globale XcodeGen-Optionen
options:
  bundleIdPrefix: io.github.danielmuellerir
  deploymentTarget:
    iOS: "17.0"
  # Xcode-Formatversion; 15 ist kompatibel mit Xcode 15+
  xcodeVersion: "15"

# Lokales SwiftPM-Package eine Ebene über ios/ (= Repo-Root)
packages:
  GameCore:
    path: ".."

# Das einzige App-Target
targets:
  Exploids:
    type: application
    platform: iOS
    deploymentTarget: "17.0"

    # Quellverzeichnis (alle .swift-Dateien und Assets darunter)
    sources:
      - path: Exploids

    # Abhängigkeit: GameCore aus dem lokalen SwiftPM-Package
    dependencies:
      - package: GameCore
        product: GameCore

    # Build-Einstellungen
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.danielmuellerir.exploids
        MARKETING_VERSION: "0.8.0"
        CURRENT_PROJECT_VERSION: 1

        # Info.plist wird von Xcode/XcodeGen automatisch generiert (kein manuelles Info.plist nötig)
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Exploids

        # Launch-Screen automatisch generieren (leerer schwarzer Screen)
        INFOPLIST_KEY_UILaunchScreen_Generation: YES

        # UI-Konfiguration: Vollbild-Landscape ohne Status-/Home-Bar
        INFOPLIST_KEY_UIStatusBarHidden: YES
        INFOPLIST_KEY_UIRequiresFullScreen: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"

        # App-Icon aus dem Asset-Catalog
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

        # Swift 6 – strikte Concurrency
        SWIFT_VERSION: "6.0"

        # iPhone (1) und iPad (2) unterstützen
        TARGETED_DEVICE_FAMILY: "1,2"

        # Code Signing: automatisch über das Apple-Developer-Team. Die Team-ID ist dieselbe
        # wie bei der macOS-Signierung (vgl. wrappers/sign-and-release.sh) und in Xcode unter
        # "Signing & Capabilities" jederzeit überschreibbar. Damit lässt sich die App direkt
        # auf ein angeschlossenes iPhone/iPad bauen (Gerätebuilds werden signiert).
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 9QSWKSR4NQ
        # Reine Simulator-Builds (Headless-Check/CI) brauchen keine Signatur – nur dort
        # abschalten; Gerätebuilds (SDK iphoneos) werden automatisch signiert.
        CODE_SIGNING_ALLOWED[sdk=iphonesimulator*]: NO
